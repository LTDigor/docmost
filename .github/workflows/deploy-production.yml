name: Deploy production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  DOCMOST_IMAGE: ghcr.io/ltdigor/docmost
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build and deploy Docmost
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCMOST_IMAGE }}:${{ github.sha }}
            ${{ env.DOCMOST_IMAGE }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install SSH key
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DOCMOST_DEPLOY_SSH_KEY }}" > ~/.ssh/docmost_deploy
          chmod 600 ~/.ssh/docmost_deploy
          ssh-keyscan -H "${{ secrets.DOCMOST_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Run deploy
        run: |
          set -euo pipefail
          image="${{ env.DOCMOST_IMAGE }}:${{ github.sha }}"
          printf '%s\n' "${{ secrets.GITHUB_TOKEN }}" | ssh \
            -i ~/.ssh/docmost_deploy \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DOCMOST_DEPLOY_USER }}@${{ secrets.DOCMOST_DEPLOY_HOST }}" \
            "docker login ghcr.io -u '${{ github.actor }}' --password-stdin >/dev/null && DOCMOST_IMAGE=${image} /usr/local/sbin/deploy-docmost-from-github"
